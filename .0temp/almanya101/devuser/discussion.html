<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tartışma Konusu Öner | almanya101</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ccircle cx='256' cy='256' r='240' fill='%234285F4'/%3E%3C/svg%3E">
  <meta name="robots" content="noindex, nofollow" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --google-blue: #4285F4;
      --google-red: #EA4335;
      --google-yellow: #FBBC05;
      --google-green: #34A853;
      --dark-bg: #000000;
      --card-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --gradient-1: linear-gradient(135deg, #4285F4 0%, #EA4335 50%, #FBBC05 100%);
      --gradient-2: linear-gradient(135deg, #34A853 0%, #4285F4 100%);
      --gradient-3: linear-gradient(135deg, #FBBC05 0%, #EA4335 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark-bg);
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: #000;
    }

    #code-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.28;
    }

    /* Grid Pattern Overlay */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
      pointer-events: none;
    }

    /* Container */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Logo */
    .top-logo {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 10px;
    }

    .top-logo img {
      width: 150px;
      height: auto;
      object-fit: contain;
      box-shadow: 0 8px 32px rgba(66, 133, 244, 0.3);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 30px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 30px;
    }

    .title-group h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(20px);
    }

    .card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .card p {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
      margin: 0;
    }

    /* Form Styles */
    .discussion-form {
      display: grid;
      gap: 20px;
    }

    .field-label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--google-blue);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-input::placeholder {
      color: var(--text-secondary);
    }

    .topic-input {
      min-height: 140px;
      resize: vertical;
    }

    /* Checkbox */
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .checkbox-label input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--google-blue);
      cursor: pointer;
    }

    /* Character Count */
    .char-meta {
      text-align: right;
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 8px;
    }

    /* Submit Button */
    .btn-primary {
      padding: 16px 32px;
      background: var(--gradient-1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(66, 133, 244, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Form Status */
    .form-status {
      display: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 500;
    }

    .form-status.loading {
      display: block;
      background: rgba(251, 188, 5, 0.15);
      color: var(--google-yellow);
      border: 1px solid rgba(251, 188, 5, 0.3);
    }

    .form-status.success {
      display: block;
      background: rgba(52, 168, 83, 0.15);
      color: var(--google-green);
      border: 1px solid rgba(52, 168, 83, 0.3);
    }

    .form-status.error {
      display: block;
      background: rgba(234, 67, 53, 0.15);
      color: var(--google-red);
      border: 1px solid rgba(234, 67, 53, 0.3);
    }

    /* Honeypot Field */
    .hp-field {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* List Section */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 20px;
    }

    .list-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }

    .refresh-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--google-blue);
    }

    /* Topic Cards */
    .approved-list {
      display: grid;
      gap: 15px;
    }

    .topic-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .topic-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
    }

    .topic-text {
      margin: 0;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .topic-meta {
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      padding: 30px;
    }

    /* Back Link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 20px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--google-blue);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      animation: fadeInUp 0.6s ease backwards;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }

      .top-logo img {
        width: 120px;
      }

      .title-group h1 {
        font-size: 20px;
      }

      .card {
        padding: 22px;
        border-radius: 20px;
      }

      .card h2 {
        font-size: 20px;
      }

      .list-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .refresh-btn {
        width: 100%;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

<body>
  <div class="bg-animation">
    <canvas id="code-canvas"></canvas>
  </div>
  <div class="grid-overlay"></div>
  
  <div class="container">
    <!-- Top Logo -->
    <div class="top-logo">
      <img src="../almanya101.png" alt="almanya101">
    </div>

    <!-- Header -->
    <header class="header">
      <div class="title-group">
        <h1>de tr software dashboard</h1>
      </div>
    </header>

    <!-- Back Link -->
    <a href="../dev.html" class="back-link">← dashboard'a dön</a>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Hero Card -->
      <div class="card">
        <h2>Tartışma Konusu Öner</h2>
        <p>Kısa konu önerini bırak. Admin onayından sonra aynı sayfada görünür.</p>
      </div>

      <!-- Form Card -->
      <div class="card">
        <form id="discussionForm" class="discussion-form" novalidate>
          <div id="nameFieldWrap">
            <label class="field-label" for="fullNameInput">Ad Soyad</label>
            <input id="fullNameInput" class="form-input" type="text" maxlength="80" placeholder="Adınız soyadınız" required />
          </div>

          <label class="checkbox-label" for="anonymousInput">
            <input id="anonymousInput" type="checkbox" />
            <span>Anonim paylaş</span>
          </label>

          <div>
            <label class="field-label" for="topicInput">Tartışılmasını istediğin konu</label>
            <textarea id="topicInput" class="form-input topic-input" maxlength="250" placeholder="En fazla 250 karakter..." required></textarea>
            <div class="char-meta"><span id="charCount">0</span> / 250</div>
          </div>

          <input id="websiteTrap" class="hp-field" type="text" name="website" autocomplete="off" tabindex="-1" />

          <button id="submitBtn" class="btn-primary" type="submit">Gönder</button>
          <div id="formStatus" class="form-status" aria-live="polite"></div>
        </form>
      </div>

      <!-- List Card -->
      <div class="card">
        <div class="list-header">
          <h4 class="list-title">Onaylanan Konular</h4>
          <button id="refreshBtn" class="refresh-btn" type="button">Yenile</button>
        </div>
        <div id="approvedState" class="empty-state">Yükleniyor...</div>
        <div id="approvedList" class="approved-list" hidden></div>
      </div>
    </main>
  </div>

  <script>
    const SUBMIT_API_URL = '/api/devuser-dis-submit';
    const LIST_API_URL = '/api/devuser-dis-list';

    const form = document.getElementById('discussionForm');
    const fullNameInput = document.getElementById('fullNameInput');
    const anonymousInput = document.getElementById('anonymousInput');
    const nameFieldWrap = document.getElementById('nameFieldWrap');
    const topicInput = document.getElementById('topicInput');
    const charCount = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const formStatus = document.getElementById('formStatus');
    const websiteTrap = document.getElementById('websiteTrap');
    const approvedState = document.getElementById('approvedState');
    const approvedList = document.getElementById('approvedList');
    const refreshBtn = document.getElementById('refreshBtn');

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = typeof value === 'string' ? value : String(value || '');
      return div.innerHTML;
    }

    function normalizeNewline(value) {
      return String(value || '').replace(/\r\n/g, '\n').trim();
    }

    function setStatus(message, type) {
      if (!message) {
        formStatus.className = 'form-status';
        formStatus.textContent = '';
        return;
      }
      formStatus.className = `form-status ${type}`.trim();
      formStatus.textContent = message;
    }

    function toggleAnonymousMode() {
      const isAnonymous = anonymousInput.checked;
      if (isAnonymous) {
        fullNameInput.value = '';
        fullNameInput.required = false;
        fullNameInput.disabled = true;
        nameFieldWrap.style.display = 'none';
      } else {
        fullNameInput.disabled = false;
        fullNameInput.required = true;
        nameFieldWrap.style.display = 'block';
      }
    }

    function updateCharCount() {
      charCount.textContent = String(topicInput.value.length);
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('tr-TR');
    }

    function renderApprovedItems(items) {
      if (!Array.isArray(items) || items.length === 0) {
        approvedList.hidden = true;
        approvedList.innerHTML = '';
        approvedState.hidden = false;
        approvedState.textContent = 'Henüz onaylanan konu yok.';
        return;
      }

      approvedState.hidden = true;
      approvedList.hidden = false;
      approvedList.innerHTML = items.map((item) => {
        const safeTopic = escapeHtml(item.topic || '');
        const safeName = item.anonymous ? 'Anonim' : escapeHtml(item.full_name || 'İsim belirtilmedi');
        const safeDate = escapeHtml(formatDate(item.created_at));

        return `
          <article class="topic-card">
            <p class="topic-text">${safeTopic}</p>
            <div class="topic-meta">${safeName} · ${safeDate}</div>
          </article>
        `;
      }).join('');
    }

    async function loadApprovedItems() {
      approvedState.hidden = false;
      approvedState.textContent = 'Yükleniyor...';
      approvedList.hidden = true;

      try {
        const response = await fetch(`${LIST_API_URL}?limit=60`, {
          method: 'GET',
          headers: { Accept: 'application/json' },
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || `HTTP ${response.status}`);
        }

        renderApprovedItems(payload.items || []);
      } catch (error) {
        approvedList.hidden = true;
        approvedState.hidden = false;
        approvedState.textContent = error.message || 'Liste yüklenemedi.';
      }
    }

    async function submitDiscussion(event) {
      event.preventDefault();
      setStatus('', '');

      const anonymous = anonymousInput.checked;
      const fullName = normalizeNewline(fullNameInput.value).replace(/\n/g, ' ');
      const topic = normalizeNewline(topicInput.value);

      if (!anonymous && !fullName) {
        setStatus('Ad soyad zorunlu (anonim seçili değil).', 'error');
        return;
      }

      if (!topic) {
        setStatus('Konu zorunlu.', 'error');
        return;
      }

      if (topic.length > 250) {
        setStatus('Konu en fazla 250 karakter olabilir.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Gönderiliyor...';
      setStatus('Kayıt alınıyor...', 'loading');

      try {
        const response = await fetch(SUBMIT_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: fullName,
            anonymous,
            topic,
            website: websiteTrap.value || '',
          }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || 'Gönderim başarısız');
        }

        form.reset();
        toggleAnonymousMode();
        updateCharCount();
        setStatus('Gönderildi. Admin onayından sonra aşağıda görünecek.', 'success');
        await loadApprovedItems();
      } catch (error) {
        setStatus(error.message || 'Gönderim sırasında hata oluştu.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Gönder';
      }
    }

    anonymousInput.addEventListener('change', toggleAnonymousMode);
    topicInput.addEventListener('input', updateCharCount);
    form.addEventListener('submit', submitDiscussion);
    refreshBtn.addEventListener('click', loadApprovedItems);

    toggleAnonymousMode();
    updateCharCount();
    loadApprovedItems();

    // Code rain animation
    const canvas = document.getElementById('code-canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz<>/{}[]();:=-+*/&|%$#@!';
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = [];
    
    for (let i = 0; i < columns; i++) {
      drops[i] = Math.random() * -100;
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#4285F4';
      ctx.font = fontSize + 'px monospace';
      
      for (let i = 0; i < drops.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * fontSize, drops[i] * fontSize);
        
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    
    setInterval(draw, 35);
  </script>
<script>
  window.goatcounter = window.goatcounter || {};
  window.goatcounter.path = location.pathname;
</script>
